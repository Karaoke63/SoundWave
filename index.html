<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundWave — Музыкальный сервис</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- ═══════════════ SIDEBAR ═══════════════ -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">♪</div>
      <div class="logo-text">SoundWave</div>
    </div>

    <div class="sidebar-section-title">Меню</div>
    <nav>
      <div class="nav-item active" data-page="home" onclick="Router.go('home')">
        <span class="nav-icon">🏠</span><span>Главная</span>
      </div>
      <div class="nav-item" data-page="catalog" onclick="Router.go('catalog')">
        <span class="nav-icon">🎵</span><span>Каталог</span>
      </div>
      <div class="nav-item" data-page="artists" onclick="Router.go('artists')">
        <span class="nav-icon">🎤</span><span>Исполнители</span>
      </div>
      <div class="nav-item" data-page="search" onclick="Router.go('search')">
        <span class="nav-icon">🔍</span><span>Поиск</span>
      </div>
      <div class="nav-item" data-page="playlists" onclick="Router.go('playlists')">
        <span class="nav-icon">📚</span><span>Мои плейлисты</span>
      </div>
    </nav>

    <div class="sidebar-section-title" style="margin-top:16px">Мои плейлисты</div>
    <div class="sidebar-playlists">
      <div id="sidebar-playlists"></div>
    </div>

    <div style="padding:0 12px 4px; margin-top: auto;">
      <a href="admin.html" style="display:flex;align-items:center;gap:10px;padding:10px 8px;font-size:14px;font-weight:500;color:var(--text-muted);border-radius:var(--radius-sm);transition:all .2s;text-decoration:none" onmouseover="this.style.color='var(--accent-1)'" onmouseout="this.style.color='var(--text-muted)'">
        <span style="width:20px;text-align:center">⚙️</span><span>Админ-панель</span>
      </a>
    </div>
  </aside>

  <!-- ═══════════════ MAIN ═══════════════ -->
  <main id="main">

    <!-- HOME -->
    <div class="page active" id="page-home"></div>

    <!-- CATALOG -->
    <div class="page" id="page-catalog"></div>

    <!-- ARTISTS LIST -->
    <div class="page" id="page-artists"></div>

    <!-- ARTIST DETAIL -->
    <div class="page" id="page-artist-detail"></div>

    <!-- SEARCH -->
    <div class="page" id="page-search"></div>

    <!-- PLAYLISTS -->
    <div class="page" id="page-playlists"></div>

  </main>

  <!-- ═══════════════ PLAYER ═══════════════ -->
  <footer id="player">

    <!-- Левая часть: трек -->
    <div class="player-track">
      <div id="player-cover" class="player-cover"
           style="background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-size:22px">♪</div>
      <div class="player-meta">
        <div class="player-title" id="player-title">Выберите трек</div>
        <div class="player-artist" id="player-artist">SoundWave</div>
      </div>
      <button class="player-like" id="player-like" title="Нравится" onclick="toggleLike()">♡</button>
    </div>

    <!-- Центр: управление -->
    <div class="player-controls">
      <div class="player-btns">
        <button class="ctrl-btn" id="player-prev" title="Назад">⏮</button>
        <button class="ctrl-btn play-main" id="player-play" title="Пауза/Играть">▶</button>
        <button class="ctrl-btn" id="player-next" title="Вперёд">⏭</button>
      </div>
      <div class="player-progress">
        <span class="time-label" id="time-now">0:00</span>
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="time-label" id="time-total">0:00</span>
      </div>
    </div>

    <!-- Правая часть: громкость -->
    <div class="player-extras">
      <div class="volume-wrap">
        <span class="vol-icon">🔈</span>
        <input type="range" class="volume-slider" id="volume-slider"
               min="0" max="100" value="70">
        <span class="vol-icon">🔊</span>
      </div>
    </div>

  </footer>
</div>

<!-- ═══════════════ TOAST ═══════════════ -->
<div class="toast" id="toast"></div>

<!-- ═══════════════ MODAL: Создать плейлист ═══════════════ -->
<div class="modal-overlay" id="modal-create-playlist" onclick="if(event.target===this)closeCreatePlaylist()">
  <div class="modal">
    <div class="modal-title">Новый плейлист</div>
    <input class="modal-input" id="modal-pl-input" type="text"
           placeholder="Название плейлиста..."
           onkeydown="if(event.key==='Enter')confirmCreatePlaylist()">
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeCreatePlaylist()">Отмена</button>
      <button class="btn-primary" onclick="confirmCreatePlaylist()">✓ Создать</button>
    </div>
  </div>
</div>

<!-- ═══════════════ MODAL: Добавить в плейлист ═══════════════ -->
<div class="modal-overlay" id="modal-add-to-playlist" onclick="if(event.target===this)closeAddToPlaylist()">
  <div class="modal">
    <div class="modal-title">Добавить в плейлист</div>
    <div class="playlist-modal-list" id="playlist-picker-list"></div>
    <!-- Создать новый — сохраняем trackId, открываем модалку создания, после создания добавляем трек -->
    <div class="playlist-modal-item pm-create" onclick="createAndAddToPlaylist()">
      <span class="pm-icon">＋</span>
      <span>Создать новый плейлист</span>
    </div>
    <div class="modal-btns" style="margin-top:12px">
      <button class="btn-ghost" onclick="closeAddToPlaylist()">Закрыть</button>
    </div>
  </div>
</div>

<!-- ═══════════════ SCRIPTS ═══════════════ -->
<script src="data/db.js"></script>
<script src="data/playlists.js"></script>
<script src="js/player.js"></script>
<script src="js/ui.js"></script>
<script src="js/pages.js"></script>

<script>
  // ── Инициализация ──────────────────────────────────────
  document.addEventListener("DOMContentLoaded", () => {
    Player.init();
    refreshSidebarPlaylists();
    Router.go("home");
  });

  // ── Создать плейлист и сразу добавить трек ─────────────
  // Вызывается из кнопки «Создать новый плейлист» в модалке добавления
  function createAndAddToPlaylist() {
    const savedTrackId = _addTrackId; // сохраняем до закрытия модалки
    closeAddToPlaylist();
    openCreatePlaylist((pl) => {
      // pl — объект созданного плейлиста (из confirmCreatePlaylist)
      if (savedTrackId !== null) {
        PlaylistManager.addTrack(pl.id, savedTrackId);
        showToast(`✅ Трек добавлен в «${pl.name}»`);
        refreshSidebarPlaylists();
        Pages.playlists?.refresh?.();
      }
    });
  }

  // ── Лайк текущего трека ────────────────────────────────
  function toggleLike() {
    const btn = document.getElementById("player-like");
    const liked = btn.classList.toggle("liked");
    btn.textContent = liked ? "♥" : "♡";
    if (liked) showToast("♥ Добавлено в избранное");
  }

  // ── Router ─────────────────────────────────────────────
  Router.go = function(pageId, params = {}) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));

    const pageEl = document.getElementById("page-" + pageId);
    if (!pageEl) return;
    pageEl.classList.add("active");

    const navTarget = pageId === "artist-detail" ? "artists" : pageId;
    const navEl = document.querySelector(`.nav-item[data-page="${navTarget}"]`);
    if (navEl) navEl.classList.add("active");

    if (Pages[pageId]) Pages[pageId].render(params);
    document.getElementById("main").scrollTop = 0;
  };
</script>

</body>
</html>
